[package]
name = "dyndo-core"
version = "0.1.0"
edition = "2021"

[lints]
workspace = true

[dependencies]
dash-mpd = { version = "0.20", default-features = false }
mp4-atom = "0.12.1"
quick-xml = { version = "0.40", features = ["serialize"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["fs", "io-util", "rt", "macros"] }

[dev-dependencies]
tempfile = "3"
