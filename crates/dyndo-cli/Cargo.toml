[package]
name = "dyndo-cli"
version = "0.1.0"
edition = "2021"

[lints]
workspace = true

[[bin]]
name = "dyndo"
path = "src/main.rs"

[dependencies]
dyndo-core = { path = "../dyndo-core" }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "fs"] }
serde_json = "1"
anyhow = "1"

[dev-dependencies]
tempfile = "3"
