# Pin an exact stable so `-D warnings` / `clippy::all = deny` builds are
# reproducible: a new stable release can't introduce a lint that breaks the
# build without a deliberate bump here. CI installs this same toolchain (the
# stable jobs run `rustup toolchain install`, which reads this file), so a
# bump is: change `channel` here, update the `FROM rust:X.Y.Z-trixie-slim`
# line in Dockerfile to match, keep `rust-version` in Cargo.toml
# [workspace.package] in lockstep, then run the full gate
# (make fmt-check lint test doc). Formatting runs on a pinned nightly instead
# (see the Makefile `NIGHTLY` variable and .github/workflows/ci.yml), because
# rustfmt.toml uses the nightly-only `group_imports` option.
[toolchain]
channel = "1.97.0"
components = ["rustfmt", "clippy"]
