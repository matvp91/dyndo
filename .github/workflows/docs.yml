name: docs

on:
  push:
    branches: [main]
  pull_request:

# Least privilege by default; the deploy job needs Pages + OIDC.
permissions:
  contents: read

# Serialize deploys; never cancel a Pages deploy in flight.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Keep in sync with the mdbook version used locally.
  MDBOOK_VERSION: 0.5.4

jobs:
  # Build the book on every push and PR so broken docs fail CI early.
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build book
        run: mdbook build docs
      # Only the main-branch build feeds a Pages deploy.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  # Publish to GitHub Pages from main only; PRs stop after build.
  deploy:
    name: deploy
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
